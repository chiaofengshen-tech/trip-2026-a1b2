<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>沖繩親子旅行</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main id="view-container">

  <!-- 首頁 -->
  <section id="view-home" class="view">

    <div class="day-tabs" id="home-day-tabs"></div>

    <div class="card center-card">
      <div class="card-label">今日主題</div>
      <div class="theme-text" id="home-theme"></div>
    </div>

    <div class="card center-card">
      <div class="card-label">出發時間</div>
      <div class="departure-time" id="home-departure"></div>
    </div>

    <div class="card center-card">
      <div class="card-label">今日重點</div>
      <div class="route-text" id="home-route"></div>
    </div>

    <div class="card center-card">
      <div class="card-label"><i class="ti ti-tools-kitchen-2"></i> 用餐</div>
      <div class="meal-block">
        <div class="meal-text" id="home-lunch"></div>
        <div class="meal-text" id="home-dinner"></div>
      </div>
    </div>

    <div class="card center-card">
      <div class="card-label"><i class="ti ti-bed"></i> 住宿</div>
      <div class="hotel-text" id="home-hotel"></div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn" data-goto="itinerary"><i class="ti ti-list"></i><span>完整行程</span></button>
      <button class="quick-btn" data-goto="map"><i class="ti ti-map-pin"></i><span>今日地圖</span></button>
      <button class="quick-btn" data-goto="info"><i class="ti ti-info-circle"></i><span>重要資訊</span></button>
    </div>

  </section>

  <!-- 行程頁 -->
  <section id="view-itinerary" class="view hidden">
    <div id="itinerary-list"></div>
  </section>

  <!-- 地圖頁 -->
  <section id="view-map" class="view hidden">
    <div class="day-tabs" id="map-day-tabs"></div>
    <div id="map-list"></div>
  </section>

  <!-- 記帳頁 -->
  <section id="view-budget" class="view hidden">

    <div class="day-tabs" id="budget-day-tabs"></div>

    <form id="expense-form" class="card">
      <div class="form-row">
        <label for="expense-item">項目</label>
        <input type="text" id="expense-item" placeholder="例如：午餐">
      </div>
      <div class="form-row">
        <label for="expense-category">分類</label>
        <select id="expense-category">
          <option value="餐飲">餐飲</option>
          <option value="門票">門票</option>
          <option value="購物">購物</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-row">
        <label for="expense-amount">金額</label>
        <input type="number" id="expense-amount" placeholder="0" min="0">
      </div>
      <div class="form-row">
        <label for="expense-payment">付款方式</label>
        <select id="expense-payment">
          <option value="現金" selected>現金</option>
          <option value="信用卡">信用卡</option>
        </select>
      </div>
      <button type="submit" class="primary-btn" id="expense-submit-btn">新增花費</button>
      <button type="button" class="primary-btn ghost hidden" id="expense-cancel-btn">取消編輯</button>
    </form>

    <div class="card center-card">
      <div class="card-label">剩餘現金</div>
      <div class="total-amount" id="budget-remaining"></div>
    </div>

    <div class="card">
      <div class="card-label">每日餐費小計</div>
      <div id="budget-day-subtotals"></div>
    </div>

    <div id="expense-list"></div>

    <div class="card">
      <div class="card-label">信用卡／現金小計</div>
      <div id="budget-payment-subtotals"></div>
    </div>

    <div class="card center-card">
      <div class="card-label">總花費</div>
      <div class="total-amount" id="budget-total"></div>
    </div>

  </section>

  <!-- 重要資訊頁 -->
  <section id="view-info" class="view hidden">

    <div class="card">
      <div class="section-title"><i class="ti ti-plane"></i> 交通資訊</div>
      <div id="info-transport"></div>
    </div>

    <div class="card">
      <div class="section-title"><i class="ti ti-bed"></i> 住宿地址</div>
      <div id="info-hotels"></div>
    </div>

  </section>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-view="home"><i class="ti ti-home"></i><span>首頁</span></button>
  <button class="nav-btn" data-view="itinerary"><i class="ti ti-list"></i><span>行程</span></button>
  <button class="nav-btn" data-view="map"><i class="ti ti-map"></i><span>地圖</span></button>
  <button class="nav-btn" data-view="budget"><i class="ti ti-wallet"></i><span>記帳</span></button>
  <button class="nav-btn" data-view="info"><i class="ti ti-info-circle"></i><span>資訊</span></button>
</nav>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.35.0/tabler-icons.min.css">
<script src="script.js"></script>
</body>
</html>
